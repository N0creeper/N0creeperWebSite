<!doctype html>
<html>

<head>
    <title>Le Hub</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="container">
        <h1>Bienvenue dans le HUB de N0creeper</h1>

        <div id="filters">
            <button class="filter-btn active" data-filter="all">Tout</button>
            <button class="filter-btn" data-filter="nouveautes">Nouveautés</button>
            <button class="filter-btn" data-filter="sites">Sites</button>
            <button class="filter-btn" data-filter="beta">Projets en Béta</button>

            <button class="filter-btn" data-filter="autres">Autres liens</button>
        </div>

        <h2>Projets</h2>
        <div id="cards-container" class="cards"></div>
    </div>

    <script src="index.js"></script>

</html>
